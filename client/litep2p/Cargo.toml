[package]
name = "qp-litep2p"
description = "Post-quantum peer-to-peer networking library for Quantus Network"
version = "0.13.2"
edition = "2021"
license = "MIT"
repository = "https://github.com/Quantus-Network/chain"

[build-dependencies]
prost-build = "0.14"

[dependencies]
async-trait = "0.1.88"
bs58 = "0.5.1"
bytes = "1.11.1"
cid = "0.11.1"
ed25519-dalek = { version = "2.1.1", features = ["rand_core"] }
futures = "0.3.27"
futures-timer = "3.0.3"
indexmap = { version = "2.9.0", features = ["std"] }
ip_network = "0.4"
libc = "0.2.158"
mockall = "0.13.1"
multiaddr = "0.17.0"
multihash = { version = "0.17.0", default-features = false, features = ["std", "multihash-impl", "identity", "sha2", "sha3", "blake2b"] }
network-interface = "2.0.1"
parking_lot = "0.12.3"
pin-project = "1.1.10"
prost = "0.13.5"
rand = { version = "0.8.0", features = ["getrandom"] }
serde = "1.0.158"
sha2 = "0.10.9"
simple-dns = "0.11.0"
smallvec = "1.15.0"
snow = { version = "0.9.3", features = ["ring-resolver"], default-features = false }
socket2 = { version = "0.5.9", features = ["all"] }
thiserror = "2.0.12"
tokio-stream = "0.1.17"
tokio-util = { version = "0.7.15", features = ["compat", "io", "codec"] }
tokio = { version = "1.45.0", features = ["rt", "net", "io-util", "time", "macros", "sync", "parking_lot"] }
tracing = { version = "0.1.40", features = ["log"] }
hickory-resolver = "0.25.2"
uint = "0.10.0"
unsigned-varint = { version = "0.8.0", features = ["codec"] }
url = "2.5.4"
x25519-dalek = "2.0.1"
x509-parser = "0.17.0"
yasna = "0.5.0"
zeroize = "1.8.1"
yamux = "0.13.9"
enum-display = "0.1.4"

# Websocket
tokio-tungstenite = { version = "0.27.0", features = ["rustls-tls-native-roots", "url"], optional = true }

# QUIC
quinn = { version = "0.9.3", default-features = false, features = ["tls-rustls", "runtime-tokio"], optional = true }
rustls = { version = "0.20.7", default-features = false, features = ["dangerous_configuration"], optional = true }
ring = { version = "0.17.14", optional = true }
webpki = { version = "0.22.4", optional = true }
rcgen = { version = "0.14.5", optional = true }

# WebRTC
str0m = { version = "0.11.1", optional = true }

# Fuzzing
serde_millis = { version = "0.1", optional = true }

[dev-dependencies]
quickcheck = "1.0.3"
serde_json = "1.0.140"
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }
futures_ringbuf = "0.4.0"
hex-literal = "1.0.0"

[features]
default = ["websocket", "quic"]
websocket = ["dep:tokio-tungstenite"]
quic = ["dep:webpki", "dep:quinn", "dep:rustls", "dep:ring", "dep:rcgen"]
webrtc = ["dep:str0m"]
rsa = ["dep:ring"]
fuzz = ["serde/derive", "serde/rc", "bytes/serde", "dep:serde_millis", "cid/serde", "multihash/serde"]
