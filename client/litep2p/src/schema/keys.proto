syntax = "proto2";

package keys_proto;

enum KeyType {
  // Post-quantum only - all classical ECC/RSA removed for security
  Dilithium = 0;  // ML-DSA-87 post-quantum signature scheme
}

message PublicKey {
  required KeyType Type = 1;
  required bytes Data = 2;
}

message PrivateKey {
  required KeyType Type = 1;
  required bytes Data = 2;
}
