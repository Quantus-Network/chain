syntax = "proto2";

package keys_proto;

enum KeyType {
  // Keep RSA/Ed25519/Secp256k1/ECDSA numbers for wire compatibility with libp2p
  RSA = 0;
  Ed25519 = 1;
  Secp256k1 = 2;
  ECDSA = 3;
  Dilithium = 4;  // ML-DSA-87 post-quantum signature scheme
}

message PublicKey {
  required KeyType Type = 1;
  required bytes Data = 2;
}

message PrivateKey {
  required KeyType Type = 1;
  required bytes Data = 2;
}
