[workspace.package]
authors = ["Quantus Network Developers <hello@quantus.com>"]
edition = "2021"
homepage = "https://quantus.com/"
license = "MIT-0"
repository = "https://github.com/quantus-network/chain#"

[workspace]
members = [
	"client/cli",
	"client/consensus/qpow",
	"client/informant",
	"client/litep2p",
	"client/network",
	"client/network-sync",
	"client/network-types",
	"client/service",
	"client/transaction-pool",
	"frame/metadata",
	"frame/executive",
	"frame/try-runtime",
	"frame/support",
	"frame/support-procedural",
	"frame/support-procedural-tools",
	"frame/support-procedural-tools-derive",
	"miner-api",
	"node",
	"pallets/assets",
	"pallets/assets-holder",
	"pallets/balances",
	"pallets/conviction-voting",
	"pallets/frame-system",
	"pallets/mining-rewards",
	"pallets/multisig",
	"pallets/preimage",
	"pallets/qpow",
	"pallets/ranked-collective",
	"pallets/recovery",
	"pallets/referenda",
	"pallets/reversible-transfers",
	"pallets/scheduler",
	"pallets/timestamp",
	"pallets/transaction-payment",
	"pallets/transaction-payment-rpc",
	"pallets/transaction-payment-rpc-runtime-api",
	"pallets/treasury",
	"pallets/utility",
	"pallets/wormhole",
	"pallets/zk-tree",
	"primitives/consensus/qpow",
	"primitives/dilithium-crypto",
	"primitives/header",
	"primitives/scheduler",
	"primitives/wormhole",
	"qpow-math",
	"runtime",
]
resolver = "2"

[workspace.lints.clippy]
# Deny unwrap and panic in production code (runtime & pallets)
# Test code can opt-out using: #![allow(clippy::unwrap_used, clippy::panic)]
panic = "deny"
unwrap_used = "deny"
# Also deny expect_used for consistency
expect_used = "deny"

