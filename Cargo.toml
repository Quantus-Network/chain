[profile.release]
opt-level = 3
panic = "unwind"

[profile.production]
codegen-units = 1
inherits = "release"
lto = true

# Optimize build scripts and their dependencies in dev mode.
# This is critical for pallet-wormhole's build.rs which generates ZK circuits.
# Without this, circuit generation takes ~10 minutes instead of ~12 seconds.
[profile.dev.build-override]
opt-level = 3

[profile.release.build-override]
opt-level = 3
