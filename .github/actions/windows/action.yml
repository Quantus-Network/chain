---
name: windows dependencies
description: installs dependencies required to compile the node and runtime on windows

runs:
  using: composite
  steps:
    - name: rust compilation prerequisites (windows)
      run: |
        choco install protoc --yes --no-progress
        choco install llvm --yes --no-progress
        rustup update
        rustup target add wasm32-unknown-unknown
        rustup component add rustfmt --toolchain nightly
        rustup component add clippy rust-src
      shell: bash

    - name: Set LIBCLANG_PATH for clang-sys (libp2p etc.)
      run: |
        echo "LIBCLANG_PATH=C:/Program Files/LLVM/bin" >> "$GITHUB_ENV"
      shell: bash
