---
name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_DEV_DEBUG: 1
  CARGO_PROFILE_TEST_DEBUG: 1

jobs:
  fast-checks:
    name: 🏁 Fast Checks (Format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ubuntu
      - name: Install required components
        run: rustup component add rustfmt --toolchain nightly
      - name: Install taplo
        run: cargo install taplo-cli --locked
      - name: Run format checks
        run: |
          taplo format --check --config taplo.toml
          cargo +nightly fmt --all -- --check

  build-and-test-matrix:
    name: 🛠️ Build & Test Matrix
    needs: fast-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ubuntu
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/ubuntu
      - name: Setup macOS
        if: matrix.os == 'macos-latest'
        uses: ./.github/actions/macos
      - name: compile
        run: cargo build --locked --workspace --features runtime-benchmarks,try-runtime
      - name: Clean build artifacts to free space
        run: |
          cargo clean
          df -h
      - name: test
        run: SKIP_WASM_BUILD=1 cargo test --locked --workspace

  analysis:
    name: 🤖 Analysis (Clippy & Doc)
    needs: fast-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ubuntu
        uses: ./.github/actions/ubuntu
      - name: Install required components
        run: rustup component add rust-src clippy
      - name: Set LIBCLANG_PATH (clippy needs clang-sys for rocksdb/bindgen)
        run: |
          # Must point to a dir that contains libclang.so or libclang-*.so (not e.g. .../lib/clang/18/lib/linux)
          VALID="${LIBCLANG_PATH:-}"
          if [ -n "$VALID" ] && [ -d "$VALID" ] && ls "$VALID"/libclang*.so* 1>/dev/null 2>&1; then
            echo "LIBCLANG_PATH already valid: $LIBCLANG_PATH"
          else
            if [ -n "$VALID" ]; then echo "LIBCLANG_PATH was invalid (no libclang*.so there): $VALID"; fi
            if command -v llvm-config >/dev/null 2>&1; then
              LIBDIR=$(llvm-config --libdir)
              echo "LIBCLANG_PATH=$LIBDIR" >> $GITHUB_ENV
              echo "Set LIBCLANG_PATH=$LIBDIR"
            else
              DIR=$(dirname "$(find /usr/lib -name 'libclang*.so*' -type f 2>/dev/null | head -1)")
              if [ -n "$DIR" ] && [ "$DIR" != "." ]; then
                echo "LIBCLANG_PATH=$DIR" >> $GITHUB_ENV
                echo "Set LIBCLANG_PATH=$DIR"
              fi
            fi
          fi
      - name: Run clippy
        run: SKIP_WASM_BUILD=1 cargo clippy --locked --workspace
      - name: Run doc
        run: SKIP_WASM_BUILD=1 cargo doc --locked --workspace --no-deps
