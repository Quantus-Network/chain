---
name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_DEV_DEBUG: 1
  CARGO_PROFILE_TEST_DEBUG: 1

jobs:
  fast-checks:
    name: 🏁 Fast Checks (Format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ubuntu
      - name: Install required components
        run: rustup component add rustfmt --toolchain nightly
      - name: Install taplo
        run: cargo install taplo-cli --locked
      - name: Run format checks
        run: |
          taplo format --check --config taplo.toml
          cargo +nightly fmt --all -- --check

  build-and-test-matrix:
    name: 🛠️ Build & Test Matrix
    needs: fast-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ubuntu
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/ubuntu
      - name: Setup macOS
        if: matrix.os == 'macos-latest'
        uses: ./.github/actions/macos
      - name: compile
        run: cargo build --locked --workspace --features runtime-benchmarks,try-runtime
      - name: Clean build artifacts to free space
        run: |
          cargo clean
          df -h
      - name: test
        run: SKIP_WASM_BUILD=1 cargo test --locked --workspace

  analysis:
    name: 🤖 Analysis (Clippy & Doc)
    needs: fast-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ubuntu
        uses: ./.github/actions/ubuntu
      - name: Install libclang for clippy (clang-sys/rocksdb)
        run: sudo apt-get update -yqq && sudo apt-get install -yqq --no-install-recommends libclang-dev
      - name: Install required components
        run: rustup component add rust-src clippy
      - name: Set LIBCLANG_PATH (clippy needs clang-sys for rocksdb/bindgen)
        run: |
          # Try known LLVM lib dirs first (ubuntu runner often has llvm-18).
          DIR=
          for ver in 18 17 16 15 14; do
            D="/usr/lib/llvm-$ver/lib"
            if [ -d "$D" ] && ls "$D"/libclang*.so* 1>/dev/null 2>&1; then
              DIR=$D
              break
            fi
          done
          if [ -z "$DIR" ]; then
            LIB=$(find /usr -name 'libclang.so*' \( -type f -o -type l \) 2>/dev/null | head -1)
            [ -n "$LIB" ] && DIR=$(dirname "$LIB")
          fi
          if [ -z "$DIR" ] || [ "$DIR" = "." ]; then
            echo "::error::Could not find libclang.so (install libclang-dev?)"
            exit 1
          fi
          echo "LIBCLANG_PATH=$DIR" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=$DIR"
      - name: Run clippy
        run: SKIP_WASM_BUILD=1 cargo clippy --locked --workspace
      - name: Run doc
        run: SKIP_WASM_BUILD=1 cargo doc --locked --workspace --no-deps
